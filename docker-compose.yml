version: '3.9'

services:
  api:
    build: .
    container_name: customer-support-email-agent
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./knowledge_base:/app/knowledge_base
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

