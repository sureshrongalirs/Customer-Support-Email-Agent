<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Email Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>📧 Customer Support Email Agent</h1>
                <p>Test and monitor your AI-powered email responses</p>
            </div>
            <nav class="nav-tabs">
                <button class="nav-btn active" data-tab="test-tab">Test Email</button>
                <button class="nav-btn" data-tab="inbox-tab">Inbox</button>
            </nav>
        </header>

        <main>
            <!-- Test Email Tab -->
            <section id="test-tab" class="tab-content active">
                <div class="test-container">
                    <h2>Test Email Processing</h2>
                    <p class="subtitle">Send a mock email to test the agent's response</p>

                    <form id="email-form" class="email-form">
                        <div class="form-group">
                            <label for="sender">From Email Address</label>
                            <input type="email" id="sender" name="sender" required
                                   placeholder="customer@example.com" value="customer@example.com">
                        </div>

                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" required
                                   placeholder="Email subject" value="I cannot login to my account">
                        </div>

                        <div class="form-group">
                            <label for="body">Message Body</label>
                            <textarea id="body" name="body" rows="6" required
                                      placeholder="Email message body">I've tried resetting my password but I'm not receiving the email. Can someone help me?</textarea>
                        </div>

                        <div class="template-buttons">
                            <label>Quick Templates:</label>
                            <div class="button-group">
                                <button type="button" class="template-btn" data-template="login">
                                    Login Issue
                                </button>
                                <button type="button" class="template-btn" data-template="billing">
                                    Billing Issue
                                </button>
                                <button type="button" class="template-btn" data-template="technical">
                                    Technical Issue
                                </button>
                                <button type="button" class="template-btn" data-template="complaint">
                                    Complaint
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary" id="submit-btn">
                            <span class="btn-text">Send Test Email</span>
                            <span class="spinner" style="display: none;"></span>
                        </button>
                    </form>

                    <div id="result-container" class="result-container" style="display: none;">
                        <div class="result-header">
                            <h3>Processing Result</h3>
                            <button class="btn-close" onclick="closeResult()">×</button>
                        </div>

                        <div id="result-content" class="result-content"></div>
                    </div>
                </div>
            </section>

            <!-- Inbox Tab -->
            <section id="inbox-tab" class="tab-content">
                <div class="inbox-container">
                    <h2>Email Inbox</h2>

                    <div class="inbox-stats">
                        <div class="stat-box">
                            <div class="stat-number" id="total-count">0</div>
                            <div class="stat-label">Total Emails</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="sent-count">0</div>
                            <div class="stat-label">Sent</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="review-count">0</div>
                            <div class="stat-label">Pending Review</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="error-count">0</div>
                            <div class="stat-label">Errors</div>
                        </div>
                    </div>

                    <div class="filter-section">
                        <label for="filter-status">Filter by Status:</label>
                        <select id="filter-status" class="filter-select">
                            <option value="">All</option>
                            <option value="completed">Completed</option>
                            <option value="pending_review">Pending Review</option>
                        </select>

                        <label for="filter-category" style="margin-left: 20px;">Filter by Category:</label>
                        <select id="filter-category" class="filter-select">
                            <option value="">All</option>
                            <option value="technical_support">Technical Support</option>
                            <option value="billing">Billing</option>
                            <option value="general_inquiry">General Inquiry</option>
                            <option value="complaint">Complaint</option>
                            <option value="feature_request">Feature Request</option>
                        </select>

                        <button class="btn-secondary" onclick="refreshInbox()" style="margin-left: 20px;">
                            🔄 Refresh
                        </button>
                    </div>

                    <div id="inbox-list" class="inbox-list">
                        <div class="empty-state">
                            <p>No emails yet. Send a test email to get started!</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Email Detail Modal -->
    <div id="email-detail-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="detail-subject">Email Details</h2>
                <button class="btn-close" onclick="closeModal()">×</button>
            </div>

            <div class="modal-body" id="detail-body">
                <!-- Email details will be loaded here -->
            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
